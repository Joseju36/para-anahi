<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Anahí</title>

<style>

/* 🌹 CANVAS ROSA */
#roseCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
pointer-events:none;
}

body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(to bottom,#000010,#000000);
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia,serif;
color:white;
text-align:center;
}

.stars{
position:absolute;
width:100%;
height:100%;
background:url('https://i.imgur.com/YKY28eT.png');
animation:moveStars 120s linear infinite;
opacity:0.7;
z-index:0;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:0 2000px;}
}

.content{
position:relative;
z-index:2;
padding:20px;
}

h1{
font-size:3em;
margin-bottom:20px;
}

.quote{
font-size:1.4em;
max-width:700px;
line-height:1.6;
}

button{
margin-top:30px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:1.1em;
cursor:pointer;
background:#b3003c;
color:white;
}

#message{
display:none;
margin-top:30px;
font-size:1.3em;
text-align:center;
}

</style>

</head>

<body>

<!-- 🌌 FONDO -->
<div class="stars"></div>

<!-- 🌹 CANVAS ROSA -->
<canvas id="roseCanvas"></canvas>

<div class="content">

<h1 id="title">💫 For E. Anahí ✨</h1>

<div class="quote" id="quote">    
The stars were already there.<br>
I just found one later - you.
</div>

<button id="touchButton" onclick="showMessage()">Touch Here 🫆</button>

<div id="message">

<span style="font-family:'Times New Roman', serif; font-size:60px;">
♡ Happy Birthday Anahí 💫💐✨
</span>

<br><br>

<button id="secretBtn" onclick="secretMessage()">
🌹 Secret Message
</button>

<div id="secretText" style="display:none; margin-top:20px;">

Ya te lo había dicho antes...<br><br>

Entre todas las casualidades del universo, conocerte fue la más bonita.<br><br>

Feliz cumpleaños, Anahí 💖

</div>

</div>

</div>

<script>

/* =========================
🌹 ROSA
========================= */
const roseCanvas = document.getElementById("roseCanvas");
const rctx = roseCanvas.getContext("2d");

roseCanvas.width = window.innerWidth;
roseCanvas.height = window.innerHeight;

function drawRose(){

rctx.clearRect(0,0,roseCanvas.width,roseCanvas.height);

let k = 5;

for(let i = 0; i < 2500; i++){

let theta = i * 0.01;

let r1 = 260 * Math.cos(k * theta);
let x1 = r1 * Math.cos(theta);
let y1 = r1 * Math.sin(theta);

let r2 = 180 * Math.cos(k * theta);
let x2 = r2 * Math.cos(theta);
let y2 = r2 * Math.sin(theta);

let offsetY = -100;

rctx.fillStyle = "#ff4da6";
rctx.fillRect(
roseCanvas.width/2 + x1,
roseCanvas.height/2 + y1 + offsetY,
3,3
);

rctx.fillStyle = "#ff99cc";
rctx.fillRect(
roseCanvas.width/2 + x2,
roseCanvas.height/2 + y2 + offsetY,
2,2
);

}
}

/* =========================
🌹 PETALOS
========================= */
function createPetal(){

const petal = document.createElement("div");

petal.innerHTML = "🌹";
petal.style.position = "fixed";
petal.style.left = Math.random()*window.innerWidth+"px";
petal.style.top = "-50px";
petal.style.fontSize = "20px";
petal.style.zIndex = "999";

document.body.appendChild(petal);

let pos = -50;

let fall = setInterval(()=>{

pos += 3;
petal.style.top = pos+"px";

if(pos > window.innerHeight){
clearInterval(fall);
petal.remove();
}

},20);
}

/* =========================
BOTÓN PRINCIPAL
========================= */
function showMessage(){

document.getElementById("message").style.display="block";
document.getElementById("quote").style.display="none";
document.getElementById("touchButton").style.display="none";
document.getElementById("title").style.display="none";

for(let i=0;i<50;i++){
setTimeout(createPetal,i*150);
}

}

/* =========================
🔑 MENSAJE SECRETO
========================= */
function secretMessage(){

const password = prompt("Enter password");

if(password === "Mushu"){

document.getElementById("secretText").style.display="block";

/* ❗ OCULTAR BOTÓN */
document.getElementById("secretBtn").style.display="none";

/* 🌹 aparece la rosa */
drawRose();

}else{
alert("Wrong password 🌹");
}

}

</script>

</body>
</html>

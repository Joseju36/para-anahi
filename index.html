<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Anahí</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(to bottom,#000010,#000000);
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia,serif;
color:white;
text-align:center;
}

.stars{
position:absolute;
width:100%;
height:100%;
background:url('https://i.imgur.com/YKY28eT.png');
animation:moveStars 120s linear infinite;
opacity:0.7;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:0 2000px;}
}

.content{
position:relative;
z-index:2;
padding:20px;
}

h1{
font-size:3em;
margin-bottom:20px;
}

.quote{
font-size:1.4em;
max-width:700px;
line-height:1.6;
}

button{
margin-top:30px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:1.1em;
cursor:pointer;
background:#b3003c;
color:white;
}

#message{
display:none;
margin-top:30px;
font-size:1.3em;
}

</style>

</head>
<body>

<div class="stars"></div>

<div class="content">

<h1> 💫 For E. Anahí ✨</h1>

<div class="quote">
The stars were already there.<br>
I just found one later - you.
</div>

<button onclick="showMessage()"> Touch Here 🫆 </button>

<div id="message">
<span style="font-family:'Times New Roman', serif; font-size:60px;">
✨ Happy Birthday Anahí ✨
</span>
</div>

</div>

<script>

function createPetal(){

const flower=Math.random()<0.7 ? "petal.png" : "rose.jpg";

const petal=document.createElement("img");

petal.src=flower;

petal.style.position="fixed";
petal.style.left=Math.random()*window.innerWidth+"px";
petal.style.top="-50px";

if(flower==="petal.png"){
    petal.style.width="35px";
}else{
    petal.style.width="50px";
}

petal.style.pointerEvents="none";
petal.style.zIndex="999";

document.body.appendChild(petal);

let pos=-50;

const fall=setInterval(()=>{

pos+=3;

petal.style.top=pos+"px";

if(pos>window.innerHeight){

clearInterval(fall);
petal.remove();

}

},20);

}

function showMessage(){

document.getElementById("message").style.display="block";

for(let i=0;i<50;i++){

setTimeout(createPetal,i*200);

}

}

</script>

</body>
</html>
